name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag to build and release (e.g. v1.0.0)'
        required: true
        type: string
      build_target:
        description: 'What to build'
        required: true
        type: choice
        options:
          - all
          - cli
          - desktop
        default: all
      draft:
        description: 'Create as draft release'
        required: false
        type: boolean
        default: true

permissions:
  contents: write

env:
  GO_VERSION: '1.25'
  NODE_VERSION: '20'

jobs:
  # ---------------------------------------------------------------------------
  # Prepare: checkout tag, extract version
  # ---------------------------------------------------------------------------
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      build_number: ${{ steps.meta.outputs.build_number }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}
      - id: meta
        run: |
          VERSION="${{ inputs.tag }}"
          VERSION="${VERSION#v}"  # strip leading 'v'
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build_number=$(date +%Y%m%d%H%M)" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # Build frontend (shared across all jobs)
  # ---------------------------------------------------------------------------
  frontend:
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci && npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-out
          path: frontend/out
          retention-days: 1

  # ---------------------------------------------------------------------------
  # CLI: cross-compile for all platforms
  # ---------------------------------------------------------------------------
  cli:
    if: inputs.build_target == 'all' || inputs.build_target == 'cli'
    needs: [prepare, frontend]
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
    runs-on: ubuntu-latest
    env:
      TFO_VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: actions/download-artifact@v4
        with:
          name: frontend-out
          path: frontend/out
      - name: Build CLI
        run: |
          SKIP_WEB=1 ./scripts/build.sh cli --os ${{ matrix.goos }} --arch ${{ matrix.goarch }}
      - name: Flatten artifacts
        run: |
          mkdir -p upload
          find dist/cli -type f -exec cp {} upload/ \;
      - uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.goos }}-${{ matrix.goarch }}
          path: upload/*
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Desktop macOS: build .app bundle + DMG (arm64 + amd64)
  # ---------------------------------------------------------------------------
  desktop-darwin:
    if: inputs.build_target == 'all' || inputs.build_target == 'desktop'
    needs: [prepare, frontend]
    strategy:
      matrix:
        include:
          - goarch: arm64
          - goarch: amd64
    runs-on: macos-14
    env:
      TFO_VERSION: ${{ needs.prepare.outputs.version }}
      TFO_BUILD_NUMBER: ${{ needs.prepare.outputs.build_number }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: actions/download-artifact@v4
        with:
          name: frontend-out
          path: frontend/out
      - name: Build .app + DMG
        run: |
          SKIP_WEB=1 ./scripts/build.sh desktop --os darwin --arch ${{ matrix.goarch }}
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-darwin-${{ matrix.goarch }}
          path: dist/TFO-*.dmg
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Desktop Windows: build exe
  # ---------------------------------------------------------------------------
  desktop-windows:
    if: inputs.build_target == 'all' || inputs.build_target == 'desktop'
    needs: [prepare, frontend]
    runs-on: ubuntu-latest
    env:
      TFO_VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: actions/download-artifact@v4
        with:
          name: frontend-out
          path: frontend/out
      - name: Build Windows desktop
        run: |
          SKIP_WEB=1 ./scripts/build.sh desktop --os windows --arch amd64
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-windows-amd64
          path: dist/desktop/windows_amd64/TFO-*
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Create GitHub Release and upload all artifacts
  # ---------------------------------------------------------------------------
  release:
    needs: [prepare, cli, desktop-darwin, desktop-windows]
    if: always() && needs.prepare.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: '{cli-*,desktop-*}'
          merge-multiple: true
      - name: List artifacts
        run: find artifacts -type f | head -30 || ls -lR artifacts
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: TFO ${{ inputs.tag }}
          draft: ${{ inputs.draft }}
          generate_release_notes: true
          files: |
            artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
